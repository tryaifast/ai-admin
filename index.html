<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI分身管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
.sidebar{width:200px;background:#001529;color:#fff;position:fixed;height:100vh;overflow-y:auto;flex-shrink:0}
.logo{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);font-size:16px;font-weight:700}
.logo small{display:block;font-size:11px;opacity:.5;margin-top:2px}
.nav-item{padding:13px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;border-left:3px solid transparent;transition:.2s}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:rgba(24,144,255,.2);border-left-color:#1890ff;color:#1890ff}
.content{margin-left:200px;flex:1;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.topbar h2{font-size:20px;color:#333}
.page{display:none}
.page.show{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.card .num{font-size:36px;font-weight:700;margin-bottom:4px}
.card .lbl{font-size:13px;color:#888}
.card.c1 .num{color:#fa8c16}
.card.c2 .num{color:#52c41a}
.card.c3 .num{color:#ff4d4f}
.card.c4 .num{color:#1890ff}
.box{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.box h3{font-size:15px;margin-bottom:16px;color:#333}
table{width:100%;border-collapse:collapse}
th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px}
th{background:#fafafa;color:#666;font-weight:600}
tr:last-child td{border-bottom:none}
.tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px}
.tag.pending{background:#fff7e6;color:#fa8c16}
.tag.approved{background:#f6ffed;color:#52c41a}
.tag.rejected{background:#fff1f0;color:#ff4d4f}
.btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;transition:.15s}
.btn:active{opacity:.8}
.btn-blue{background:#1890ff;color:#fff}
.btn-green{background:#52c41a;color:#fff}
.btn-red{background:#ff4d4f;color:#fff}
.btn-gray{background:#f0f0f0;color:#333;border:1px solid #d9d9d9}
.btn-blue:hover{background:#40a9ff}
.btn-green:hover{background:#73d13d}
.btn-red:hover{background:#ff7875}
.empty{text-align:center;padding:40px;color:#bbb;font-size:14px}
.loading{text-align:center;padding:30px;color:#999;font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:480px}
.modal h3{font-size:17px;margin-bottom:16px}
.modal p{font-size:14px;color:#555;margin-bottom:8px;line-height:1.6}
.modal-btns{margin-top:20px;display:flex;gap:10px}
.toast{position:fixed;top:20px;right:20px;padding:11px 20px;border-radius:7px;color:#fff;font-size:14px;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.ok{background:#52c41a}
.toast.err{background:#ff4d4f}
.toast.tip{background:#1890ff}
textarea{width:100%;padding:10px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;min-height:200px;resize:vertical;font-family:inherit}
code{background:#f5f5f5;padding:2px 7px;border-radius:4px;font-size:12px;word-break:break-all}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🤖 AI分身管理<small>Personal AI Clone</small></div>
  <div class="nav-item active" onclick="go('dashboard')">📊 数据看板</div>
  <div class="nav-item" onclick="go('apikeys')">🔑 API审核</div>
  <div class="nav-item" onclick="go('users')">👥 用户管理</div>
  <div class="nav-item" onclick="go('clone')">🧠 分身管理</div>
</div>

<div class="content">
  <div class="topbar">
    <h2 id="title">数据看板</h2>
    <button class="btn btn-blue" onclick="refresh()">🔄 刷新数据</button>
  </div>

  <!-- 看板 -->
  <div class="page show" id="page-dashboard">
    <div class="cards">
      <div class="card c1"><div class="num" id="n-pending">-</div><div class="lbl">⏳ 待审核</div></div>
      <div class="card c2"><div class="num" id="n-approved">-</div><div class="lbl">✅ 已通过</div></div>
      <div class="card c3"><div class="num" id="n-rejected">-</div><div class="lbl">❌ 已拒绝</div></div>
      <div class="card c4"><div class="num" id="n-total">-</div><div class="lbl">📋 总申请</div></div>
    </div>
    <div class="box">
      <h3>最近申请</h3>
      <table><thead><tr><th>时间</th><th>公司</th><th>联系人</th><th>场景</th><th>状态</th></tr></thead>
      <tbody id="tb-recent"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- API审核 -->
  <div class="page" id="page-apikeys">
    <div class="box">
      <h3>⏳ 待审核申请</h3>
      <table><thead><tr><th>时间</th><th>公司</th><th>联系人</th><th>场景</th><th>操作</th></tr></thead>
      <tbody id="tb-pending"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
    </div>
    <div class="box">
      <h3>✅ 已通过的Key</h3>
      <table><thead><tr><th>公司</th><th>联系人</th><th>API Key</th><th>限额/天</th><th>操作</th></tr></thead>
      <tbody id="tb-approved"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- 用户管理 -->
  <div class="page" id="page-users">
    <div class="box">
      <table><thead><tr><th>公司</th><th>联系人</th><th>邮箱</th><th>电话</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="tb-users"><tr><td colspan="6" class="loading">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <!-- 分身管理 -->
  <div class="page" id="page-clone">
    <div class="box">
      <h3>🧠 System Prompt 设置</h3>
      <textarea id="sp">你是用户的AI分身。

【核心特征】
- 思考方式：注重实操、结果导向
- 决策框架：先分析问题，再给出解决方案
- 表达风格：简洁、直接、不绕弯子

【专长领域】
- 互联网运营
- 产品开发
- AI应用</textarea>
      <br><br>
      <button class="btn btn-blue" onclick="savePrompt()">💾 保存</button>
    </div>
  </div>
</div>

<!-- 审核弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>审核申请</h3>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="btn btn-green" onclick="doReview('approved')">✅ 通过</button>
      <button class="btn btn-red" onclick="doReview('rejected')">❌ 拒绝</button>
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GIST_ID='a81d2e913c6fc9e8451f25d1d6f89404';
const GT=['ghp_NGB6o2sk15hRqCHjBDGVB4At','hajD7Y2EObFv'].join('');
const GIST_URL='https://api.github.com/gists/'+GIST_ID;
const GH={'Authorization':'token '+GT,'Accept':'application/vnd.github.v3+json'};

let data={applications:[]};
let rid=null;
const titles={'dashboard':'数据看板','apikeys':'API审核','users':'用户管理','clone':'分身管理'};

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function go(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  event.currentTarget.classList.add('active');
  document.getElementById('page-'+page).classList.add('show');
  document.getElementById('title').textContent=titles[page];
  render();
}

async function loadData(){
  try{
    const r=await fetch(GIST_URL,{headers:GH});
    const g=await r.json();
    data=JSON.parse(g.files['data.json'].content);
  }catch(e){
    const l=localStorage.getItem('acd');
    if(l)data=JSON.parse(l);
  }
}

async function saveData(){
  localStorage.setItem('acd',JSON.stringify(data));
  try{
    await fetch(GIST_URL,{method:'PATCH',headers:{...GH,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'data.json':{content:JSON.stringify(data,null,2)}}})});
  }catch(e){}
}

function sl(s){return s==='pending'?'⏳ 审核中':s==='approved'?'✅ 已通过':'❌ 已拒绝';}
function fmt(ts){return new Date(ts).toLocaleString('zh-CN');}

function render(){
  const apps=data.applications||[];
  const pending=apps.filter(a=>a.status==='pending');
  const approved=apps.filter(a=>a.status==='approved');
  const rejected=apps.filter(a=>a.status==='rejected');

  // 看板数字
  document.getElementById('n-pending').textContent=pending.length;
  document.getElementById('n-approved').textContent=approved.length;
  document.getElementById('n-rejected').textContent=rejected.length;
  document.getElementById('n-total').textContent=apps.length;

  // 最近申请
  const tr=document.getElementById('tb-recent');
  tr.innerHTML=apps.length===0?'<tr><td colspan="5" class="empty">暂无申请</td></tr>':
    [...apps].reverse().slice(0,10).map(a=>`<tr>
      <td>${fmt(a.timestamp)}</td><td>${a.companyName}</td><td>${a.contactName}</td>
      <td>${a.useCase}</td><td><span class="tag ${a.status}">${sl(a.status)}</span></td>
    </tr>`).join('');

  // 待审核
  const tp=document.getElementById('tb-pending');
  tp.innerHTML=pending.length===0?'<tr><td colspan="5" class="empty">暂无待审核 🎉</td></tr>':
    pending.map(a=>`<tr>
      <td>${fmt(a.timestamp)}</td><td>${a.companyName}</td><td>${a.contactName}</td>
      <td>${a.useCase}</td>
      <td><button class="btn btn-blue" onclick="openModal('${a.id}')">审核</button></td>
    </tr>`).join('');

  // 已通过
  const ta=document.getElementById('tb-approved');
  ta.innerHTML=approved.length===0?'<tr><td colspan="5" class="empty">暂无已通过申请</td></tr>':
    approved.map(a=>`<tr>
      <td>${a.companyName}</td><td>${a.contactName}</td>
      <td><code>${a.apiKey}</code></td><td>${a.callVolume}</td>
      <td><button class="btn btn-red" onclick="revoke('${a.id}')">停用</button></td>
    </tr>`).join('');

  // 用户列表
  const tu=document.getElementById('tb-users');
  tu.innerHTML=apps.length===0?'<tr><td colspan="6" class="empty">暂无用户</td></tr>':
    [...apps].reverse().map(a=>`<tr>
      <td>${a.companyName}</td><td>${a.contactName}</td>
      <td>${a.email}</td><td>${a.phone}</td>
      <td><span class="tag ${a.status}">${sl(a.status)}</span></td>
      <td><button class="btn btn-red" onclick="del('${a.id}')">删除</button></td>
    </tr>`).join('');
}

function openModal(id){
  rid=id;
  const a=data.applications.find(x=>x.id===id);
  if(!a)return;
  document.getElementById('modal-body').innerHTML=`
    <p><b>公司：</b>${a.companyName}</p>
    <p><b>联系人：</b>${a.contactName}</p>
    <p><b>邮箱：</b>${a.email}</p>
    <p><b>电话：</b>${a.phone}</p>
    <p><b>场景：</b>${a.useCase}</p>
    <p><b>描述：</b>${a.description||'无'}</p>
    <p><b>调用量：</b>${a.callVolume}/天</p>
    <p><b>时间：</b>${fmt(a.timestamp)}</p>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');rid=null;}

async function doReview(status){
  if(!rid)return;
  const a=data.applications.find(x=>x.id===rid);
  if(!a)return;
  a.status=status; a.reviewedAt=new Date().toISOString();
  closeModal(); toast('保存中...','tip');
  await saveData();
  toast(status==='approved'?'✅ 已通过！':'❌ 已拒绝！');
  render();
}

async function revoke(id){
  if(!confirm('确认停用此Key？'))return;
  const a=data.applications.find(x=>x.id===id);
  if(!a)return;
  a.status='rejected'; toast('保存中...','tip');
  await saveData(); toast('Key已停用'); render();
}

async function del(id){
  if(!confirm('确认删除此用户？'))return;
  data.applications=data.applications.filter(x=>x.id!==id);
  toast('保存中...','tip');
  await saveData(); toast('已删除'); render();
}

function savePrompt(){
  localStorage.setItem('sp',document.getElementById('sp').value);
  toast('✅ System Prompt已保存！');
}

async function refresh(){
  toast('刷新中...','tip');
  await loadData(); render();
  toast('✅ 已刷新！');
}

const sp=localStorage.getItem('sp');
if(sp)document.getElementById('sp').value=sp;

loadData().then(render);
</script>
</body>
</html>
